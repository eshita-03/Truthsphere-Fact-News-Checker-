<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TruthSphere</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <h1><a href="index.html" style="color:white;text-decoration:none;">TruthSphere</a></h1>
</nav>

<div class="auth-container">
  <h2>Login</h2>
  <input id="loginEmail" type="email" placeholder="Enter Email">
  <input id="loginPassword" type="password" placeholder="Enter Password">
  <button onclick="login()">Login</button>
  <div id="loginMsg" class="msg"></div>
  <p>No account? <a href="signup.html">Sign Up</a></p>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
