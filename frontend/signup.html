<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - TruthSphere</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <h1><a href="index.html" style="color:white;text-decoration:none;">TruthSphere</a></h1>
</nav>

<div class="auth-container">
  <h2>Create Account</h2>
  <input id="signupName" type="text" placeholder="Enter Name">
  <input id="signupEmail" type="email" placeholder="Enter Email">
  <input id="signupPassword" type="password" placeholder="Enter Password (min 6 chars)">
  <button onclick="signup()">Sign Up</button>
  <div id="signupMsg" class="msg"></div>
  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
